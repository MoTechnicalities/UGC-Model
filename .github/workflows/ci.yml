name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust Format Check
        run: cargo fmt --all -- --check

      - name: Cargo Check
        run: cargo check --locked

      - name: Cargo Test
        run: cargo test --locked
